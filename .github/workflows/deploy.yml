name: Deploy

# Auto-deploy after merge/push to main:
#   Android → Google Play Internal testing track
#   iOS     → TestFlight
on:
  push:
    branches: [main]

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  analyze-and-test:
    name: Analyze & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze code
        run: flutter analyze --fatal-infos

      - name: Run tests
        run: flutter test

  deploy-android:
    name: Deploy Android (Internal)
    needs: analyze-and-test
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true

      - name: Setup Android signing
        uses: ./.github/actions/setup-android-signing
        with:
          keystore-base64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          keystore-password: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          key-alias: ${{ secrets.ANDROID_KEY_ALIAS }}
          key-password: ${{ secrets.ANDROID_KEY_PASSWORD }}
          play-json-base64: ${{ secrets.GOOGLE_PLAY_JSON_KEY_BASE64 }}

      - name: Install dependencies
        run: flutter pub get

      - name: Deploy to Google Play Internal
        working-directory: android
        env:
          GOOGLE_PLAY_JSON_KEY_PATH: fastlane/google-play-key.json
        run: bundle exec fastlane beta

  deploy-ios:
    name: Deploy iOS (TestFlight)
    needs: analyze-and-test
    runs-on: macos-latest
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true

      - name: Setup App Store Connect
        uses: ./.github/actions/setup-app-store-connect
        with:
          api-key-base64: ${{ secrets.APP_STORE_CONNECT_API_KEY_BASE64 }}
          key-id: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          issuer-id: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          match-ssh-private-key: ${{ secrets.MATCH_SSH_PRIVATE_KEY }}
          match-git-url: ${{ secrets.MATCH_GIT_URL }}

      - name: Install dependencies
        run: flutter pub get

      - name: Deploy to TestFlight
        working-directory: ios
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          MATCH_GIT_URL: ${{ secrets.MATCH_GIT_URL }}
          MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
          MATCH_GIT_BASIC_AUTHORIZATION: ${{ secrets.MATCH_GIT_BASIC_AUTHORIZATION }}
        run: bundle exec fastlane beta
